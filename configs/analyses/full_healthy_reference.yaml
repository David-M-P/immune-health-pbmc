run:
  name: full_healthy_reference
  mode: full

datasets:
  healthy:
    - aidav2
    - immuneindonesia
    - immunobiologyaging
    - onek1k
    - terekhova
  validation:
    - soundlife
  query: []

sampling:
  max_donors_per_dataset: null
  max_cells_per_donor: null
  sampler_modes: [native_all_cells, donor_uniform_observed, hybrid]
  optional_sampler_modes: [fully_balanced]

models:
  tripso:
    enabled: true
    primary_model: Base
    initialization: geneformer_static_hybrid
    epochs: 20
    seeds:
      - 42
      - 43
      - 44
    full_geneformer: gated_sensitivity
    sequential_global: gated_sensitivity

reports:
  generate_full_report: true
